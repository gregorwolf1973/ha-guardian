name: "HA Guardian"
version: "1.24.2"
slug: "ha_guardian"
description: "Brute-force protection for Home Assistant – monitors logs and auto-bans attacking IPs via ip_bans.yaml (application layer) with optional network-level blocking"
url: "https://github.com/gregorwolf1973/ha-guardian"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
host_network: true
cap_add:
  - NET_ADMIN
hassio_api: true
hassio_role: admin
ingress: true
ingress_port: 8101
panel_icon: mdi:shield-lock
panel_title: Guardian
ports:
  "8102/tcp": 8102
ports_description:
  "8102/tcp": "Guardian direct access (optional, for debugging)"
map:
  - type: config
    read_only: false
  - type: all_addon_configs
    read_only: true
  - type: share
    read_only: true
  - type: media
    read_only: true
options:
  max_attempts: 5
  window_minutes: 5
  ban_duration_minutes: 240
  alert_window_hours: 24
  scan_interval_seconds: 1
  addon_poll_interval: 15
  log_interval_minutes: 5
  log_file: "/config/home-assistant.log"
schema:
  max_attempts: "int(1,100)"
  window_minutes: "int(1,60)"
  ban_duration_minutes: "int(0,43200)"
  alert_window_hours: "int(1,168)"
  scan_interval_seconds: "int(1,60)"
  addon_poll_interval: "int(5,300)"
  log_interval_minutes: "int(1,60)"
  log_file: str
